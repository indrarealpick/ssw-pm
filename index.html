<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#07070d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OTAFF">
  <meta name="description" content="Flashcard kosakata bahasa Jepang industri pangan — OTAFF 5.1">

  <title>OTAFF 語彙カード</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>

  <!-- ── LOADING ── -->
  <div id="loading">
    <div class="loading-logo">語彙<span>カード</span></div>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-sub">OTAFF 5.1 · 飲食料品製造業</div>
  </div>

  <!-- ── APP ── -->
  <div id="app">

    <!-- HEADER -->
    <header>
      <div class="header-brand">語彙<em>カード</em></div>
      <div class="header-count" id="headerCount">— 語</div>
      <div class="header-spacer"></div>
      <button class="icon-btn" id="btnFavFilter" title="お気に入り" aria-label="お気に入りを見る">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
        </svg>
      </button>
      <button class="icon-btn" id="btnShuffle" title="シャッフル" aria-label="シャッフル">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/>
        </svg>
      </button>
    </header>

    <div class="main-content">

      <!-- CATEGORY TABS -->
      <div class="tabs-wrap">
        <div class="tabs" id="tabsContainer" role="tablist" aria-label="カテゴリ"></div>
      </div>

      <!-- CONTROLS -->
      <div class="controls">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803 7.5 7.5 0 0015.803 15.803z"/>
          </svg>
          <input type="search" id="searchInput" placeholder="検索... (日本語 / インドネシア語)" autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
      </div>

      <!-- MODE BAR -->
      <div class="mode-bar" id="modeBar" role="tablist" aria-label="モード"></div>

      <!-- STATS -->
      <div class="stats-bar" id="statsBar"></div>

      <!-- PROGRESS -->
      <div class="progress-wrap">
        <div class="progress-info">
          <span class="progress-label" id="progressLabel">0 / 0</span>
          <span class="progress-pct" id="progressPct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>

      <!-- CARD AREA -->
      <div class="card-area" id="cardArea" aria-live="polite"></div>

      <!-- LIST VIEW -->
      <div class="list-view" id="listView" role="list"></div>

      <!-- CARD NAV -->
      <div class="card-nav">
        <button class="nav-btn" id="btnPrev" title="前のカード" aria-label="前">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
          </svg>
        </button>
        <div class="nav-center" id="navCenter">—</div>
        <button class="nav-btn" id="btnNext" title="次のカード" aria-label="次">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
          </svg>
        </button>
      </div>

    </div><!-- /main-content -->

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav" aria-label="メインナビゲーション">
      <button class="bnav-btn active" data-mode="study" aria-label="学習">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/>
        </svg>
        学習
      </button>
      <button class="bnav-btn" data-mode="random" aria-label="ランダム">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/>
        </svg>
        ランダム
      </button>
      <button class="bnav-btn" data-mode="favorites" aria-label="お気に入り">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
        </svg>
        お気に入り
      </button>
      <button class="bnav-btn" data-mode="list" aria-label="一覧">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-.375 5.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
        </svg>
        一覧
      </button>
    </nav>

    <!-- TOAST -->
    <div class="toast-wrap" id="toastWrap" aria-live="polite"></div>

  </div><!-- /app -->

  <script src="./app.js"></script>
</body>
</html>
